<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Stories App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>
<body>
    <header>
        <h1>My Typing Stories</h1>
        <p>Type along with your favorite books.</p>
    </header>
    
    <main>
        <section class="controls-section">
            <div id="story-selector" class="button-group">
                <p class="loading-text">Loading library...</p>
            </div>
            <div class="upload-area">
                <span>Or upload a local file: </span>
                <input type="file" id="file-upload" accept=".txt,.epub">
            </div>
        </section>
        
        <section id="story-display" class="viewer">
            <div id="stats-bar">
                <span id="wpm-display">WPM: 0</span>
                <div id="chapter-controls" style="display: none;">
                    <button id="prev-chapter">❮ Prev Chapter</button>
                    <span id="chapter-indicator">Chapter 1</span>
                    <button id="next-chapter">Next Chapter ❯</button>
                </div>
            </div>

            <div id="viewer-content">
                <p class="placeholder-text" style="color: #666; text-align: center; margin-top: 50px;">Select a story from above to begin typing.</p>
            </div>

            <div class="input-container">
                <input type="text" id="typing-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Start typing here..." disabled>
            </div>
        </section>
    </main>

    <script src="script.js?v=2"></script>
</body>
</html>
